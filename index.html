<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#17162b" />
    <title>おだんご重力砲台</title>
  </head>
  <body>
    <main id="app">
      <section class="game-shell" aria-label="おだんご重力砲台">
        <header class="hud">
          <div>
            <p class="eyebrow">M2 CORE RULES</p>
            <h1>おだんご重力砲台</h1>
          </div>
          <div class="readouts" aria-live="polite">
            <span><b id="score-value">0</b><small>スコア</small></span>
            <span><b id="enemy-value">5</b><small>残り敵</small></span>
            <span><b id="ammo-value">6</b><small>残弾</small></span>
            <span><b id="bounce-value">0 / 6</b><small>反射</small></span>
          </div>
          <button id="pause-button" class="icon-button" type="button" aria-label="ポーズ">Ⅱ</button>
        </header>

        <div id="game" class="game-canvas"></div>

        <aside id="help-card" class="help-card">
          <p class="eyebrow">HOW TO FIRE</p>
          <p><kbd>Space</kbd> またはボタンを押してチャージ、離して発射。</p>
          <button id="dismiss-help" type="button">了解</button>
        </aside>

        <div id="pause-panel" class="pause-panel" hidden>
          <p class="eyebrow">PAUSED</p>
          <h2>ひとやすみ</h2>
          <button id="resume-button" type="button">つづける</button>
          <button id="retry-button" class="secondary" type="button">やりなおす</button>
        </div>

        <div id="result-panel" class="result-panel" hidden>
          <p id="result-eyebrow" class="eyebrow">STAGE CLEAR</p>
          <h2 id="result-title">おみごと！</h2>
          <div class="result-summary">
            <span><small>SCORE</small><b id="result-score">0</b></span>
            <span><small>RANK</small><b id="result-rank">B</b></span>
          </div>
          <button id="result-retry-button" type="button">もう一度あそぶ</button>
        </div>

        <footer class="controls">
          <div class="charge-copy">
            <span>CHARGE</span>
            <div class="charge-track"><i id="charge-fill"></i></div>
            <small id="status-copy">狙いを定めています</small>
          </div>
          <button id="fire-button" class="fire-button" type="button">
            <span>押してためる</span>
            <b>発射</b>
          </button>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
