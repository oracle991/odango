<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#17162b" />
    <title>おだんご重力砲台</title>
  </head>
  <body>
    <main id="app">
      <section class="game-shell" aria-label="おだんご重力砲台">
        <header class="hud">
          <div>
            <p class="eyebrow">M1 FLIGHT LAB</p>
            <h1>おだんご重力砲台</h1>
          </div>
          <div class="readouts" aria-live="polite">
            <span><b id="angle-value">--</b><small>角度</small></span>
            <span><b id="power-value">--</b><small>初速</small></span>
            <span><b id="bounce-value">0 / 6</b><small>反射</small></span>
          </div>
          <button id="pause-button" class="icon-button" type="button" aria-label="ポーズ">Ⅱ</button>
        </header>

        <div id="game" class="game-canvas"></div>

        <aside id="help-card" class="help-card">
          <p class="eyebrow">HOW TO FIRE</p>
          <p><kbd>Space</kbd> またはボタンを押してチャージ、離して発射。</p>
          <button id="dismiss-help" type="button">了解</button>
        </aside>

        <div id="pause-panel" class="pause-panel" hidden>
          <p class="eyebrow">PAUSED</p>
          <h2>ひとやすみ</h2>
          <button id="resume-button" type="button">つづける</button>
          <button id="retry-button" class="secondary" type="button">やりなおす</button>
        </div>

        <footer class="controls">
          <div class="charge-copy">
            <span>CHARGE</span>
            <div class="charge-track"><i id="charge-fill"></i></div>
            <small id="status-copy">狙いを定めています</small>
          </div>
          <button id="fire-button" class="fire-button" type="button">
            <span>押してためる</span>
            <b>発射</b>
          </button>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
